<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>トラブルシューティング</title>
<style>
  body { margin: 0; font-family: system-ui, "Yu Gothic", sans-serif; background: #f7f4ee; color: #2f2a24; }
  main { max-width: 900px; margin: 0 auto; padding: 24px; }
  article { background: #fff; border: 1px solid #ded8cc; border-radius: 8px; padding: 18px; margin: 14px 0; }
  h2 { margin-bottom: 6px; }
  li { margin: 8px 0; }
  a { color: #2f6f73; font-weight: 800; }
</style>
</head>
<body>
<main>
  <h1>トラブルシューティング</h1>
  <article>
    <h2>カメラが起動しない</h2>
    <ul>
      <li>ブラウザのカメラ許可を確認してください。</li>
      <li>HTTPSの本番URLで開いてください。</li>
      <li>他のカメラアプリを閉じてから再読み込みしてください。</li>
    </ul>
  </article>
  <article>
    <h2>マーカーを認識しない</h2>
    <ul>
      <li>マーカー全体を画面に入れてください。</li>
      <li>暗い場所や反射の強い机を避けてください。</li>
      <li>印刷が小さい場合は、少し大きめに印刷してください。</li>
    </ul>
  </article>
  <article>
    <h2>ARが重い</h2>
    <ul>
      <li>一度ブラウザを閉じて開き直してください。</li>
      <li>古い端末では3D立体または印刷カードを使ってください。</li>
    </ul>
  </article>
  <p><a href="選択支援メニュー.html">選択支援メニューに戻る</a></p>
</main>
</body>
</html>
